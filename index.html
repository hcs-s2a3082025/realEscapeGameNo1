<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCAPE SYSTEM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen" class="start-screen">

    <div class="logo">
        ESCAPE SYSTEM
    </div>

    <p>暴走したシステムを停止せよ</p>

    <input
        id="teamName"
        type="text"
        placeholder="チーム名を入力">

    <button onclick="startGame()">
        GAME START
    </button>

</div>

<div id="gameScreen" class="phone hidden">

    <div class="header">
        ESCAPE SYSTEM
    </div>

    <div class="timer-card">
        <span>TIME LEFT</span>
        <h1 id="timer">45:00</h1>
    </div>

    <div class="mission-card">
        <h3>MISSION</h3>
        <p id="missionText">
            QRコードを探して解析せよ
        </p>
    </div>

    <div class="status-card">

        <div>
            <span>ITEMS</span>
            <h2 id="itemCount">0</h2>
        </div>

        <div>
            <span>DATA</span>
            <h2 id="infoCount">0</h2>
        </div>

    </div>

    <div id="content" class="content">

        <div class="welcome">

            <h2>ようこそ</h2>

            <p>
                教室内を探索し、
                システム停止コードを探してください。
            </p>

        </div>

    </div>

    <div class="bottom-nav">

        <button onclick="scanQR()">
            QR
        </button>

        <button onclick="showItems()">
            ITEM
        </button>

        <button onclick="showInfos()">
            DATA
        </button>

        <button onclick="showPuzzle()">
            CODE
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
